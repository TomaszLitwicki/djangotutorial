<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <title>Zarejestruj się</title>
  </head>
  <body>
    <h2>Rejestracja nowego konta</h2>
    
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Zarejestruj się</button>
    </form>
    
    <p>Masz już konto? <a href="{% url 'login' %}">Zaloguj się</a></p>
    <p><a href="/">Powrót do strony głównej</a></p>
  </body>
</html>
