<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>RESULTATY</title>
  </head>
  <body>
    <p>{{ question.question_text }}</p>
    <p>
      <ul>
        {% for choice in question.choice_set.all %}
          <li>
            {{ choice.choice_text }} -- {{ choice.votes }} vote {{ choice.votes|pluralize }}
          </li>
        {% endfor %}
      </ul>
    </p>
    <p>
      <a href="{% url 'pollsapp:ksywkadetail' question.id %}"> Głosujesz jeszcze rez? </a>
      <br>
      <a href="{% url 'pollsapp:index'%}"> A może wracasz do pytań? </a>
    </p>
  </body>
</html>
