<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>My POLLS</title>
  </head>
  <body>
    <p>Dzień dobry :)</p>
    <p>
      {% if question_list %}
        <ul>
          {% for question in question_list %}
            <li>
              <a href="{% url 'pollsapp:ksywkadetail' question.id %}">{{question.question_text}}</a>
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <p>Nie ma polls nie ma zabawy!</p>
      {% endif %}
    </p>
  </body>
</html>
